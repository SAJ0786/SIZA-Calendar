
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#4a4a4a"/>
<title>Calendar Religiously</title>
<link rel="manifest" href="manifest.webmanifest"/>
<link rel="icon" href="icons/icon-192.png"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<style>
:root{--app-bg:#e5e7eb;--panel-bg:#4a4a4a;--panel-border:#5f5f5f;--text:#f5f5f5;--muted:#d1d5db;--input-bg:#f3f4f6;--input-text:#111827;--happy-bg:#edf8ef;--happy-text:#166534;--grief-bg:#fff1f2;--grief-text:#b91c1c;--major-bg:#fff8e8;--major-text:#8b6a16;--menu-btn:#6b7280}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--app-bg);color:var(--text)}
.wrap{max-width:980px;margin:0 auto;padding:14px}
.hero,.panel,.menu-panel{background:var(--panel-bg);border:1px solid var(--panel-border);border-radius:26px;box-shadow:0 14px 30px rgba(0,0,0,.12)}
.hero{padding:16px;margin-bottom:16px;position:sticky;top:0;z-index:20}
.hero-grid{display:grid;grid-template-columns:1.2fr .95fr;gap:14px;align-items:start}
.brand-row{display:flex;align-items:center;gap:12px}
.menu-btn{width:56px;height:56px;border:none;border-radius:18px;background:var(--menu-btn);color:#111827;font-size:1.5rem;cursor:pointer}
.logo-box{width:68px;height:68px;border-radius:18px;background:var(--panel-bg);display:grid;place-items:center;overflow:hidden}
.logo-box img{width:92%;height:92%;object-fit:contain}
h1{margin:0;font-size:2rem}
.sub{color:var(--muted);font-size:1.05rem}
.topbox{border:1px solid var(--panel-border);border-radius:22px;padding:18px}
.toplabel{color:var(--muted);font-size:.95rem;margin-bottom:4px}
.topvalue{font-size:1.05rem;font-weight:700;min-height:1.3em}
.next-wrap{margin-top:10px;padding:14px;border-radius:18px;border:1px solid transparent}
.next-wrap.happy{background:var(--happy-bg);color:var(--happy-text)}
.next-wrap.grief{background:var(--grief-bg);color:var(--grief-text)}
.next-wrap.major{background:var(--major-bg);color:var(--major-text)}
.panel{padding:18px;margin-bottom:16px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:16px}
h2{margin:0 0 16px 0;font-size:1.3rem}
label{display:block;margin:0 0 8px 0;color:var(--text);font-size:1rem}
input,select{width:100%;padding:14px 16px;border-radius:18px;border:1px solid #cfd4da;background:var(--input-bg);color:var(--input-text);font-size:1rem;appearance:none;-webkit-appearance:none}
.result{margin-top:16px;padding:18px;border-radius:18px;border:1px solid var(--panel-border);min-height:86px;display:flex;flex-direction:column;justify-content:center}
.result .big{font-size:1.25rem;font-weight:800}
.menu-panel{position:fixed;top:88px;left:14px;width:min(300px,calc(100vw - 28px));padding:12px;display:none;z-index:50}
.menu-panel.open{display:block}
.menu-item{width:100%;text-align:left;padding:14px;border:none;background:#f3f4f6;color:#111827;border-radius:16px;margin:6px 0;font-weight:700;cursor:pointer}
.menu-item.active{background:#9ca3af}
.pane{display:none}
.pane.active{display:block}
.controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}
.calendar-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;touch-action:pan-x;padding-bottom:6px}
.calendar-inner{width:max-content;min-width:1120px}
.weekdays,.cells{display:grid;grid-template-columns:repeat(7,160px)}
.weekday{padding:12px;text-align:center;background:#5a5a5a;border-right:1px solid #666;border-bottom:1px solid #666;font-weight:700}
.cell{min-height:120px;padding:10px;border-right:1px solid #666;border-bottom:1px solid #666;background:#3f3f3f}
.cell-top{display:flex;justify-content:space-between;gap:8px}
.hsmall{font-size:.74rem;color:#d1d5db}
.badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:.72rem;font-weight:700;margin-bottom:6px}
.happy{background:var(--happy-bg);color:var(--happy-text)}
.grief{background:var(--grief-bg);color:var(--grief-text)}
.major{background:var(--major-bg);color:var(--major-text)}
.event-chip{display:block;font-size:.68rem;padding:4px 6px;border-radius:12px;margin-top:4px}
.events-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.event-card{padding:14px;border-radius:18px}
.row{display:flex;gap:10px;flex-wrap:wrap}
.smallbtn{padding:10px 14px;border:none;border-radius:14px;background:#f3f4f6;color:#111827;font-weight:700;cursor:pointer}
.notice{display:none;padding:12px 14px;background:#eef7ff;color:#35556c;border-radius:16px;margin-bottom:12px}
.saved-item{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:12px;border:1px solid var(--panel-border);border-radius:16px;margin-bottom:10px}
@media (max-width: 820px){
  .hero-grid,.two,.events-grid,.controls{grid-template-columns:1fr}
  .calendar-inner{min-width:1120px}
}
</style>
</head>
<body>
<div class="menu-panel" id="menuPanel">
  <button class="menu-item active" data-pane="convert">Convert</button>
  <button class="menu-item" data-pane="events">Events</button>
  <button class="menu-item" data-pane="gregorian">Gregorian View</button>
  <button class="menu-item" data-pane="hijri">Hijri View</button>
  <button class="menu-item" data-pane="adjust">Adjust Future Dates</button>
  <button class="menu-item" data-pane="tools">Tools</button>
  <button class="menu-item" data-pane="about">About</button>
</div>

<div class="wrap">

function gregorianToJdn(year, month, day){const a=Math.floor((14-month)/12), y=year+4800-a, m=month+12*a-3; return day+Math.floor((153*m+2)/5)+365*y+Math.floor(y/4)-Math.floor(y/100)+Math.floor(y/400)-32045;}

function renderEvents(selectedValue){const events=filteredEvents(); const sel=document.getElementById("eventSelect"); const cur=selectedValue||sel.dataset.selected||""; sel.innerHTML=events.map(e=>`<option value="${e.name}__${e.hYear}__${e.day}__${e.month}">${e.name}</option>`).join(""); sel.onchange=(ev)=>{sel.dataset.selected=ev.target.value; renderEvents(ev.target.value);}; const detail=document.getElementById("eventDetail"); if(!events.length){detail.innerHTML=`<div>${t("noMatching")}</div>`; document.getElementById("eventsGrid").innerHTML=""; return;} const picked=events.find(e=>`${e.name}__${e.hYear}__${e.day}__${e.month}`===cur)||events[0]; const pickedVal=`${picked.name}__${picked.hYear}__${picked.day}__${picked.month}`; sel.value=pickedVal; sel.dataset.selected=pickedVal; detail.innerHTML=`<div class="badge ${eventTone(picked.type)}">${picked.type}</div><div style="font-weight:800;font-size:1.15rem;margin-top:10px">${picked.name}</div><div style="margin-top:6px">Hijri: ${picked.day} ${MONTHS_H[picked.month-1]} ${picked.hYear} AH</div><div>Gregorian: ${formatGregorian(picked.g)} (${picked.weekday})</div>`; document.getElementById("eventYearLabel").textContent=state.eventYearMode==="gregorian"?`Gregorian ${new Date().getFullYear()}`:`Hijri ${currentHijriYear()} AH`; document.getElementById("eventsGrid").innerHTML=events.map(e=>`<div class="event-card ${eventTone(e.type)}"><div class="badge ${eventTone(e.type)}">${e.type}</div><div style="font-weight:700;margin-top:8px">${e.name}</div><div style="margin-top:4px">${e.day} ${MONTHS_H[e.month-1]} ${e.hYear} AH</div><div>${formatGregorian(e.g)} • ${e.weekday}</div></div>`).join("");}
function renderGregorianCalendar(){const y=+document.getElementById("browseGYear").value, m=+document.getElementById("browseGMonth").value; document.getElementById("gBrowseLabel").textContent=`${MONTHS_G[m-1]} ${y}`; document.getElementById("weekdaysG").innerHTML=WEEKDAYS.map(d=>`<div class="weekday">${d.slice(0,3)}</div>`).join(""); const first=new Date(y,m-1,1).getDay(), total=new Date(y,m,0).getDate(), evs=activeEventList(); let cells=[]; for(let i=0;i<first;i++) cells.push(null); for(let day=1;day<=total;day++){const g={year:y,month:m,day}; const h=adjustedGregorianToIslamic(y,m,day,state.overrides); const list=evs.filter(e=>e.g.year===y&&e.g.month===m&&e.g.day===day); cells.push({g,h,list});} while(cells.length%7!==0) cells.push(null); document.getElementById("gCalendar").innerHTML=cells.map(c=>!c?`<div class="cell"></div>`:`<div class="cell"><div class="cell-top"><div>${c.g.day}</div><div class="hsmall">${c.h.day} ${MONTHS_H[c.h.month-1].slice(0,3)}</div></div>${c.list.slice(0,3).map(e=>`<span class="event-chip ${eventTone(e.type)}">${e.name}</span>`).join("")}</div>`).join("");}
function renderHijriCalendar(){const y=+document.getElementById("browseHYear").value, m=+document.getElementById("browseHMonth").value; document.getElementById("hBrowseLabel").textContent=`${MONTHS_H[m-1]} ${y} AH`; document.getElementById("weekdaysH").innerHTML=WEEKDAYS.map(d=>`<div class="weekday">${d.slice(0,3)}</div>`).join(""); const startG=adjustedIslamicToGregorian(y,m,1,state.overrides), next=addHijriMonths(y,m,1), nextStart=adjustedIslamicToGregorian(next.year,next.month,1,state.overrides), len=gregorianToJdn(nextStart.year,nextStart.month,nextStart.day)-gregorianToJdn(startG.year,startG.month,startG.day), first=new Date(startG.year,startG.month-1,startG.day).getDay(), evs=activeEventList(); let cells=[]; for(let i=0;i<first;i++) cells.push(null); for(let day=1;day<=len;day++){const g=adjustedIslamicToGregorian(y,m,day,state.overrides); const list=evs.filter(e=>e.hYear===y&&e.month===m&&e.day===day); cells.push({h:{year:y,month:m,day},g,list});} while(cells.length%7!==0) cells.push(null); document.getElementById("hCalendar").innerHTML=cells.map(c=>!c?`<div class="cell"></div>`:`<div class="cell"><div class="cell-top"><div>${c.h.day}</div><div class="hsmall">${c.g.day} ${MONTHS_G[c.g.month-1].slice(0,3)}</div></div>${c.list.slice(0,3).map(e=>`<span class="event-chip ${eventTone(e.type)}">${e.name}</span>`).join("")}</div>`).join("");}
function renderOverrides(){const box=document.getElementById("savedOverrides"); if(!state.overrides.length){box.innerHTML=`<div>${t("savedCorrections")}: 0</div>`; return;} box.innerHTML=state.overrides.map((ov,idx)=>`<div class="saved-item"><div>1 ${MONTHS_H[ov.hMonth-1]} ${ov.hYear} AH → ${ov.gDate}</div><button class="smallbtn" data-remove="${idx}">${t("remove")}</button></div>`).join(""); box.querySelectorAll("[data-remove]").forEach(btn=>btn.onclick=()=>{state.overrides=state.overrides.filter((_,i)=>i!==+btn.dataset.remove); saveState(); renderAll();});}
function renderAll(){applyLanguage(); renderHeader(); renderConverters(); renderEvents(); renderGregorianCalendar(); renderHijriCalendar(); renderOverrides();}
function saveAndRender(){saveState(); renderAll();}
function setup(){loadState(); const today=new Date(); document.getElementById("gInput").value=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`; document.getElementById("hMonth").innerHTML=MONTHS_H.map((m,i)=>`<option value="${i+1}">${i+1}. ${m}</option>`).join(""); document.getElementById("ovMonth").innerHTML=MONTHS_H.map((m,i)=>`<option value="${i+1}">${i+1}. ${m}</option>`).join(""); document.getElementById("browseGMonth").innerHTML=MONTHS_G.map((m,i)=>`<option value="${i+1}">${m}</option>`).join(""); document.getElementById("browseHMonth").innerHTML=MONTHS_H.map((m,i)=>`<option value="${i+1}">${i+1}. ${m}</option>`).join(""); document.getElementById("hMonth").value=state.hMonth; document.getElementById("hYear").value=state.hYear; document.getElementById("hDay").value=state.hDay; document.getElementById("browseGYear").value=state.browseGregorianYear; document.getElementById("browseGMonth").value=state.browseGregorianMonth; document.getElementById("browseGSlider").value=state.browseGregorianYear; document.getElementById("browseHYear").value=state.browseHijriYear; document.getElementById("browseHMonth").value=state.browseHijriMonth; document.getElementById("browseHSlider").value=state.browseHijriYear; document.getElementById("languageSelect").value=state.language;
document.getElementById("menuToggle").onclick=(e)=>{e.stopPropagation(); document.getElementById("menuPanel").classList.toggle("open");};
document.querySelectorAll(".menu-item").forEach(btn=>btn.onclick=()=>{document.querySelectorAll(".pane").forEach(p=>p.classList.remove("active")); document.getElementById("pane-"+btn.dataset.pane).classList.add("active"); document.querySelectorAll(".menu-item").forEach(b=>b.classList.remove("active")); btn.classList.add("active"); document.getElementById("menuPanel").classList.remove("open");});
document.addEventListener("click",(e)=>{const mp=document.getElementById("menuPanel"), mt=document.getElementById("menuToggle"); if(!mp.contains(e.target)&&!mt.contains(e.target)) mp.classList.remove("open");});
["gInput","hDay","hMonth","hYear","eventSearch","browseGYear","browseGMonth","browseHYear","browseHMonth"].forEach(id=>document.getElementById(id).addEventListener("input",()=>{state.hDay=+document.getElementById("hDay").value||1; state.hMonth=+document.getElementById("hMonth").value||1; state.hYear=+document.getElementById("hYear").value||1447; state.browseGregorianYear=+document.getElementById("browseGYear").value||new Date().getFullYear(); state.browseGregorianMonth=+document.getElementById("browseGMonth").value||1; state.browseHijriYear=+document.getElementById("browseHYear").value||1447; state.browseHijriMonth=+document.getElementById("browseHMonth").value||1; saveAndRender();}));
document.getElementById("modeGregorian").onclick=()=>{state.eventYearMode="gregorian"; saveAndRender();};
document.getElementById("modeHijri").onclick=()=>{state.eventYearMode="hijri"; saveAndRender();};
document.getElementById("browseGSlider").oninput=e=>{document.getElementById("browseGYear").value=e.target.value; state.browseGregorianYear=+e.target.value; saveAndRender();};
document.getElementById("browseHSlider").oninput=e=>{document.getElementById("browseHYear").value=e.target.value; state.browseHijriYear=+e.target.value; saveAndRender();};
document.getElementById("saveOverride").onclick=()=>{const entry={hMonth:+document.getElementById("ovMonth").value,hYear:+document.getElementById("ovYear").value,gDate:document.getElementById("ovDate").value}; state.overrides=[...state.overrides.filter(o=>!(o.hMonth===entry.hMonth&&o.hYear===entry.hYear)),entry]; saveAndRender(); showNotice("Correction saved");};
document.getElementById("clearOverrides").onclick=()=>{state.overrides=[]; saveAndRender();};
document.getElementById("languageSelect").onchange=e=>{state.language=e.target.value; saveAndRender();};
document.getElementById("copyLink").onclick=async()=>{try{const payload=encodeURIComponent(btoa(JSON.stringify(state))); await navigator.clipboard.writeText(`${location.origin}${location.pathname}#${payload}`); showNotice("Link copied");}catch(e){showNotice("Could not copy link");}};
document.getElementById("exportJson").onclick=()=>{const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="siza-calendar-settings.json"; a.click();};
document.getElementById("importJson").onchange=e=>{const file=e.target.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=()=>{try{state={...state,...JSON.parse(String(reader.result))}; saveAndRender();}catch(err){showNotice("Import failed");}}; reader.readAsText(file);};
const hash=location.hash.replace(/^#/,''); if(hash){try{state={...state,...JSON.parse(atob(decodeURIComponent(hash)))}}catch(e){}}
renderAll();
if("serviceWorker" in navigator) navigator.serviceWorker.register("./sw.js").catch(()=>{});
}
setup();
</script>
</body>
</html>
